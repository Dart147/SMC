name: Frontend Snapshot

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-snapshot.yaml"

concurrency: # 
  group: smc-preview-${{ github.event.number }}-frontend # Groups these jobs by the PR number
  cancel-in-progress: true # if an older build is running for this PR, kill it

jobs:
  Frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lint
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          target: lint
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Format
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          target: format
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Test
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          target: test
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  Push-Image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [Frontend]
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image (load locally for /healthz)
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          target: runtime
          load: true
          pull: true
          no-cache-filters: runtime
          build-args: |
            APK_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}
          tags: cn18smc/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Run /healthz check
        run: |
          docker run -d --rm -p 8080:80 --name frontend-healthz "cn18smc/frontend:ci"
          if ! curl -fsS --retry 10 --retry-delay 1 --retry-all-errors http://localhost:8080/healthz; then
            echo "::group::nginx container logs"
            docker logs frontend-healthz || true
            echo "::endgroup::"
            docker stop frontend-healthz || true
            exit 1
          fi
          docker stop frontend-healthz

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Push runtime image
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          target: runtime
          push: true
          pull: true
          no-cache-filters: runtime
          build-args: |
            APK_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}
          tags: |
            cn18smc/frontend:pr-${{ github.event.number }}
            cn18smc/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  #Deploy: WIP
