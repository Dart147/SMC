name: Frontend Snapshot

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-snapshot.yaml"

jobs:
  Frontend:
    name: Frontend checks (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: editor
            image: cn18smc/frontend-editor
            dockerContext: frontend/Editor/app
            dockerfile: frontend/Editor/app/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dockerContext }}
          file: ${{ matrix.dockerfile }}
          target: lint
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Format
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dockerContext }}
          file: ${{ matrix.dockerfile }}
          target: format
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Test
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dockerContext }}
          file: ${{ matrix.dockerfile }}
          target: test
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  Push-Image:
    name: Build and push Docker image (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [Frontend]
    if: github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      matrix:
        include:
          - name: editor
            image: cn18smc/frontend-editor
            dockerContext: frontend/Editor/app
            dockerfile: frontend/Editor/app/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (load locally for /healthz)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dockerContext }}
          file: ${{ matrix.dockerfile }}
          target: runtime
          load: true
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Run /healthz check
        run: |
          docker run -d --rm -p 8080:80 --name frontend-healthz "${IMAGE}:ci"
          if ! curl -fsS --retry 10 --retry-delay 1 --retry-all-errors http://localhost:8080/healthz; then
            echo "::group::nginx container logs"
            docker logs frontend-healthz || true
            echo "::endgroup::"
            docker stop frontend-healthz || true
            exit 1
          fi
          docker stop frontend-healthz
        env:
          IMAGE: ${{ matrix.image }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Push runtime image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dockerContext }}
          file: ${{ matrix.dockerfile }}
          target: runtime
          push: true
          tags: |
            ${{ matrix.image }}:pr-${{ github.event.number }}
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

