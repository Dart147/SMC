name: Backend Dev

on:
  push:
    branches:
      - main

concurrency: # ensures that only one deployment job runs at a time
  group: smc-deploy-dev-backend
  cancel-in-progress: false # if a deployment is currently running, dont kill it

jobs:
  Backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lint
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: lint
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Format
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: format
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Test
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: test
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  Build-and-Push:
    name: Build and Push Dev Image
    runs-on: ubuntu-latest
    needs: [Backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and Push runtime image
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: runtime
          push: true
          pull: true
          no-cache-filters: runtime
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_VERSION=dev
          tags: |
            lovetsmc/backend:dev
            lovetsmc/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  #Deploy: WIP (handled by SMC-CD)
