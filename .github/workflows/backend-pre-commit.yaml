name: Backend Pre-Commit

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches-ignore:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-pre-commit.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # Groups these jobs by the workflow name and branch name
  cancel-in-progress: true # if a newer build is triggered for the same branch, kill the older one

jobs:
  check-if-in-pr:
    runs-on: ubuntu-latest
    outputs:
      in_pr: ${{ steps.check.outputs.result }}
    steps:
      - name: Check if branch is part of an open PR
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            return prs.data.length > 0;

  Backend:
    name: Backend checks
    needs: check-if-in-pr
    if: needs.check-if-in-pr.outputs.in_pr == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lint
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: lint
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Format
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: format
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Test
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile
          target: test
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
