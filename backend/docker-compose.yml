version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smc-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: smcdb
    ports:
      - "5432:5432"
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smcdb"]
      interval: 3s    # 每 3 秒檢查一次
      timeout: 3s     # 超時時間
      retries: 5      # 失敗最多重試 5 次

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smc-backend
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres 
    # 等 postgres 的狀態變成 "healthy" 才可以啟動後端
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure