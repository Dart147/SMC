server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location = /healthz {
		add_header Content-Type text/plain;
		return 200 "ok\n";
	}

	# Serve built assets with long cache; filenames are hashed by Vite.
	location /assets/ {
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# Single Page fallback: let the client router handle non-file paths.
	location / {
		try_files $uri $uri/ /index.html;
	}
}
